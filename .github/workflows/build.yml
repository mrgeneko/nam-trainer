name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        type: string

jobs:
  build:
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos
            artifact: NAMTrainer-macOS
            extension: zip
          - os: windows-latest
            name: windows
            artifact: NAMTrainer-Windows
            extension: zip
          - os: ubuntu-latest
            name: linux
            artifact: NAMTrainer-Linux
            extension: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller nam_trainer.spec
        env:
          # Disable GPU for PyTorch to avoid CUDA errors in CI
          CUDA_VISIBLE_DEVICES: ''

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref_name }}" =~ ^v ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="build-${{ github.sha }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Creating release for version: $VERSION"

      - name: Prepare artifact (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          # Create zip of the .app bundle
          zip -r NAMTrainer-macOS.zip NAMTrainer.app

      - name: Prepare artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd dist
          powershell -Command "Compress-Archive -Path NAMTrainer.exe -DestinationPath NAMTrainer-Windows.zip -Force"

      - name: Prepare artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          tar -czvf ../NAMTrainer-Linux.tar.gz NAMTrainer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ steps.version.outputs.version }}
          path: |
            dist/*.zip
            dist/*.tar.gz
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
